document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

order-box}\nhtml{scroll-behavior:smooth}\nbody{font-family:'Plus Jakarta Sans',sans-serif;background:#fff;color:var(--t2);line-height:1.65;-webkit-font-smoothing:antialiased;overflow-x:hidden}\n.wrap{max-width:560px;margin:0 auto;padding:0 22px}\n.sp{padding:48px 0}\nh1,h2{font-weight:900;line-height:1.1;letter-spacing:-.03em;color:var(--t1)}\nstrong{color:var(--t1);font-weight:700}\n.grad-text{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}\n.divline-blue{height:1px;background:linear-gradient(90deg,var(--blue) 0%,rgba(29,155,240,.12) 60%,transparent 100%)}\n\n/* SECTION BG */\n.s-white{background:#fff}\n.s-tint{background:var(--bg-tint)}\n.s-dark{background:var(--bg-dark)}\n\n/* ═══════════════════════════════════\n   EYEBROW\n═══════════════════════════════════ */\n.eyebrow{\n  font-family:'JetBrains Mono',monospace;\n  font-size:10px;font-weight:500;\n  letter-spacing:.12em;text-transform:uppercase;\n  color:var(--blue);\n  display:flex;align-items:center;gap:10px;\n  margin-bottom:12px;\n}\n.eyebrow::before{\n  content:'';display:block;\n  width:20px;height:2px;\n  background:var(--blue);border-radius:2px;\n  transform-origin:left;transform:scaleX(0);\n  transition:transform .45s ease .1s;\n  flex-shrink:0;\n}\n.eyebrow.ey-in::before{transform:scaleX(1)}\n\n/* ═══════════════════════════════════\n   SCROLL REVEAL\n═══════════════════════════════════ */\n.sr{opacity:0;transform:translateY(18px);transition:opacity .38s ease,transform .38s ease}\n.sr.in{opacity:1;transform:none}\n.d1{transition-delay:.07s} .d2{transition-delay:.14s} .d3{transition-delay:.21s}\n.d4{transition-delay:.28s} .d5{transition-delay:.35s} .d6{transition-delay:.42s}\n\n/* ═══════════════════════════════════\n   HERO (dark bg)\n═══════════════════════════════════ */\n.hero{padding:52px 0 48px;position:relative;overflow:hidden}\n.hero::before{\n  content:'';position:absolute;inset:0;\n  background-image:radial-gradient(circle,rgba(2 ,255,.88);-webkit-text-fill-color:rgba(255,255,255,.88)}\n.hero-chips{display:flex;flex-wrap:wrap;gap:8px;position:relative;margin-bottom:16px}\n.chip{font-size:11px;font-weight:700;border:none;border-radius:100px;padding:5px 13px;color:#fff;background:var(--grad);box-shadow:0 2px 10px rgba(29,155,240,.25)}\n.hipaa-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.28);border-radius:100px;padding:5px 14px;position:relative}\n.hipaa-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--green)}\n\n/* ═══════════════════════════════════\n   STAT CARDS\n═══════════════════════════════════ */\n.stat3{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:24px}\n.stat3-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px 16px;text-align:center}\n.stat3-card.full{grid-column:1/-1}\n.stat3-num{font-size:2.4rem;font-weight:900;line-height:1;margin-bottom:8px;letter-spacing:-.04em}\n.c-red{color:var(--red)}\n.c-amber{color:var(--amber)}\n.c-teal{color:var(--teal)}\n.c-blue-g{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}\n.c-green{color:var(--green)}\n.stat3-lbl{font-size:.73rem;font-weight:700;color:var(--t1);line-height:1.4}\n.stat3-sub{font-size:.71rem;color:var(--t3);margin-top:4px;line-height:1.4}\n.footnote{font-family:'JetBrains Mono',monospace;font-size:.71rem;color:rgba(29,155,240,.75);margin-top:16px;line-height:1.6;padding-top:14px;border-top:1px solid var(--border)}\n\n/* ═══════════════════════════════════\n   LEAK CARDS\n═══════════════════════════════════ */\n.leak-grid{display:flex;flex-direction:column;gap:10px;margin-top:22px}\n.leak-card{background:#fff;border:1px solid var(--border);border-left:3px solid;border-radius:14px;padding:18px 16px}\n.lk-red{border-left-color:var(--red);background:rgba(239,68,68,.03)}\n.lk-amber{border-left-color:var(--amber);background:rgba(245,158,11,.03)}\n.lk-blue{border-left-color:var(--blue);background:rgba(29,155,240,.03)}\n.lk-green{border-left-color:var(--green);background:rgba(0,212,170,.03)}\n.lk-teal{border-left-color:var(--teal);background:rgba(13,148,136,.03)}\n.leak-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}\n.leak-ico{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px;background:var(--bg-tint)}\n.leak-title{font-size:.9rem;font-weight:700;color:var(--t1)}\n.leak-body{font-size:.82rem;line-height:1.65;color:var(--t2)}\n.warn-bar{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.4);border-left:3px solid var(--amber);border-radius:10px;padding:14px 16px;margin-top:16px;font-size:.82rem;font-weight:700;color:#7C3510;line-height:1.5}\n\n/* ═══════════════════════════════════\n   PROPS GRID\n═══════════════════════════════════ */\n.props-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:22px}\n.prop-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px 14px}\n.prop-dot{width:8px;height:8px;border-radius:50%;margin-bottom:12px}\n.pd-blue{background:var(--blue)} .pd-green{background:var(--green)}\n.pd-teal{background:var(--teal)} .pd-navy{background:var(--navy)}\n.prop-label{font-family:'JetBrains Mono',monospace;font-size:.63rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);margin-bottom:6px}\n.pl-g{color:var(--green)} .pl-t{color:var(--teal)} .pl-n{color:var(--navy)}\n.prop-body{font-size:.79rem;line-height:1.6;color:var(--t2)}\n\n/* ═══════════════════════════════════\n   5 LAYERS\n═══════════════════════════════════ */\n.layers{display:flex;flex-direction:column;gap:0;margin-top:24px}\n.layer-connector{\n  display:flex;align-items:center;justify-content:center;\n  gap:6px;padding:6px 0;\n  font-family:'JetBrains Mono',monospace;\n  font-size:9px;font-weight:500;letter-spacing:.08em;\n  color:var(--t3);\n}\n.layer-connector::before,.layer-connector::after{\n  content:'';flex:1;height:1px;\n  background:linear-gradient(90deg,transparent,var(--border));\n}\n.layer-connector::after{background:linear-gradient(90deg,var(--border),transparent)}\n.layer-row{\n  display:flex;border-radius:14px;overflow:hidden;\n  border:1px solid var(--border);\n  box-shadow:0 2px 12px rgba(0,0,0,.05);\n  transition:box-shadow .2s ease,transform .2s ease;\n}\n.layer-row:hover{box-shadow:0 6px 24px rgba(29,155,240,.12);transform:translateY(-1px)}\n.layer-num{\n  width:68px;flex-shrink:0;\n  display:flex;align-items:center;justify-content:center;\n  font-size:2.2rem;font-weight:900;color:#fff;\n  letter-spacing:-.04em;line-height:1;padding:20px 0;\n}\n.ln1{background:linear-gradient(160deg,#1D9BF0,#1574C8)}\n.ln2{background:linear-gradient(160deg,#2E7ED8,#2460AF)}\n.ln3{background:linear-gradient(160deg,#4660C0,#3548A0)}\n.ln4{background:linear-gradient(160deg,#6042B0,#4E3298)}\n.ln5{background:linear-gradient(160deg,#8B5CF6,#7C3AED)}\n.layer-body{flex:1;background:#fff;padding:20px 18px;display:flex;flex-direction:column;justify-content:center}\n.layer-sub{font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:5px}\n.layer-title{font-size:1rem;font-weight:800;color:var(--t1);margin-bottom:6px}\n.layer-desc{font-size:.8rem;line-height:1.6;color:var(--t2)}\n.layer-warn{\n  display:flex;align-items:flex-start;gap:12px;\n  background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.25);\n  border-left:4px solid var(--amber);border-radius:12px;\n  padding:16px;margin-top:18px;\n  box-shadow:0 2px 12px rgba(245,158,11,.08);\n}\n.layer-warn-text{font-size:.8rem;font-weight:600;color:#92400e;line-height:1.55}\n\n/* ═══════════════════════════════════\n   COMPARISON TABLE\n═══════════════════════════════════ */\n.comp-table{margin-top:22px}\n.comp-col-he x;padding-top:20px;border-top:1px solid rgba(255,255,255,.12);text-align:center;line-height:1.8}\n\n/* COUNTER POP */\n@keyframes stat-pop{\n  0%{transform:scale(.82);opacity:0}\n  60%{transform:scale(1.06)}\n  100%{transform:scale(1);opacity:1}\n}\n.stat-pop{animation:stat-pop .5s cubic-bezier(.34,1.56,.64,1) both}\n<\u002Fstyle>\n\n\n\n<\u002Fhead>\n<body>\n\n<!-- ════ HERO (dark) ════ -->\n<div class=\"s-dark\">\n<div class=\"wrap\">\n<section class=\"hero\">\n  <div class=\"hero-top sr\">\n    <div class=\"logo\">X<sup>5<\u002Fsup> Digital<\u002Fdiv>\n    <div class=\"hero-for\">Healthcare &amp; Medical Practices<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"badge sr d1\">\n    <div class=\"badge-dot\"><\u002Fdiv>\n    <span>AI-Powered Healthcare Marketing Engine<\u002Fspan>\n  <\u002Fdiv>\n  <h1 class=\"sr d2\">The AI-Powered Marketing Engine Built for Growth-Stage Healthcare<\u002Fh1>\n  <div class=\"hero-rule sr d3\"><\u002Fdiv>\n  <h2 class=\"hero-owned grad-text sr d3\">And Owned by You.<\u002Fh2>\n  <p class=\"hero-sub sr d4\">Call tracking · Google Search &amp; Local SEO · speed-to-contact alerts · AI agents · 5-step no-show prevention · review automation · rebooking sequences — built inside your practice in 90 days. HIPAA-safe. <strong>You own 100% of everything.<\u002Fstrong><\u002Fp>\n  <div class=\"hero-chips sr d5\">\n    <div class=\"chip\">Call tracking<\u002Fdiv>\n    <div class=\"chip\">Local SEO<\u002Fdiv>\n    <div class=\"chip\">No-show prevention<\u002Fdiv>\n    <div class=\"chip\">Review automation<\u002Fdiv>\n    <div class=\"chip\">Rebooking sequences<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"hipaa-badge sr d5\">\n    <div class=\"badge-dot\" style=\"animation:none;background:var(--green);box-shadow:0 0 6px rgba(0,212,170,.5)\"><\u002Fdiv>\n    <span class=\"hipaa-lbl\">✓ HIPAA-Safe by Design<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ════ PROBLEM (tint) ════ -->\n<div class=\"s-tint\">\n<div class=\"wrap\">\n<section class=\"sp\">\n  <div class=\"eyebrow sr\">The Hidden Problem<\u002Fdiv>\n  <h2 class=\"sr d1\" style=\"font-size:clamp(1.5rem,6vw,2.1rem)\">The Form Was Submitted. The Chair Is Still Empty.<\u002Fh2>\n  <p class=\"sr d2\" style=\"font-size:.88rem;margin-top:12px;color:var(--t2)\">Most healthcare practices focus on getting leads. The problem is what happens after the form is submitted — and three gaps are quietly turning inquiries into empty appointment slots:<\u002Fp>\n  <div class=\"stat3 sr d3\">\n    <div class=\"stat3-card\">\n      <div class=\"stat3-num c-red\">30+ min<\u002Fdiv>\n      <div class=\"stat3-lbl\">Callback too slow to convert<\u002Fdiv>\n      <div class=\"stat3-sub\">Calling back within 5 minutes of a form submission is 80% more likely to convert than calling after 30 minutes. Most practices call back hours later — or the next day.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stat3-card\">\n      <div class=\"stat3-num c-amber\">20–40%<\u002Fdiv>\n      <div class=\"stat3-lbl\">No-shows drain revenue daily<\u002Fdiv>\n      <div class=\"stat3-sub\">Practices without a structured reminder sequence see 20–40% no-show rates. Every empty chair is a slot that was marketed for, paid for, and scheduled — and delivered nothing.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stat3-card full\">\n      <div class=\"stat3-num c-teal\">Unknown<\u002Fdiv>\n      <div class=\"stat3-lbl\">Which ad drove that patient?<\u002Fdiv>\n      <div class=\"stat3-sub\">Most practices track clicks and form submissions. But calls — the most common way patients book — aren't tracked. Budget gets allocated to what looks active, not what fills chairs.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <p class=\"footnote sr d4\">▸ An appointment showed is the conversion that matters. Everything before it is infrastructure.<\u002Fp>\n<\u002Fsection>\n<\u002Fdiv>\n<\u002Fdiv>\n<div class=\"divline-blue\"><\u002Fdiv>\n\n<!-- ════ REVENUE GAPS (white) ════ -->\n<div class=\"s-white\">\n<div class=\"wrap\">\n<section class=\"sp\">\n  <div class=\"eyebrow sr\">The Cost of Not Knowing<\u002Fdiv>\n  <h2 class=\"sr d1\" style=\"font-size:clamp(1.4rem,5.5vw,1.9rem)\">Four Revenue Gaps Most Practices Can't See From Inside.<\u002Fh2>\n  <div class=\"leak-grid\">\n    <div class=\"leak-card lk-red sr d1\">\n      <div class=\"leak-head\">\n        <div class=\"leak-ico\">📞<\u002Fdiv>\n        <div class=\"leak-title\">Calls that aren't tracked<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"leak-body\">Most patients call before they fill a form. Without call tracking, you don't know which campaign drove the call, which service they asked about, or whether it converted to an appointment.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"leak-card lk-amber sr d2\">\n      <div class=\"leak-head\">\n        <div class=\"leak-ico\">🌙<\u002Fdiv>\n        <div class=\"leak-title\">After-hours leads with no follow-up<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"leak-body\">A patient submits a form at 9pm. No auto-response. No SMS. They research another practice and book there by morning. After-hours is a lost-lead problem with a simple automation fix.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"leak-card lk-blue sr d3\">\n      <div class=\"leak-head\">\n        <div class=\"leak-ico\">👤<\u002Fdiv>\n        <div class=\"leak-title\">No-shows with no recovery sequence<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"leak-body\">A no-show doesn't have to be a lost patient. Without an automated reschedule offer within 1 hour, most no-shows disappear. With one, 20–30% rebook.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"leak-card lk-teal sr d4\">\n      <div class=\"leak-head\">\n        <div class=\"leak-ico\">⭐<\u002Fdiv>\n        <div class=\"leak-title\">Reviews left to chance<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"leak-body\">Satisfied patients rarely review without being asked. Unsatisfied ones do. Without a systematic review request at 24h post-visit, your score drifts down while competitors automate theirs up.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"warn-bar sr d5\">⚠️ Each gap is fixable with the right automation. None of them are visible without the right tracking.<\u002Fdiv>\n<\u002Fsection>\n<\u002Fdiv>\n<\u002Fdiv>\n<div class=\"divline-blue\"><\u002Fdiv>\n\n<!-- ════ HOW X5 WORKS (tint) ════ -->\n<div class=\"s-tint\">\n<div class=\"wrap\">\n<section class=\"sp\">\n  <div class=\"eyebrow sr\">How X⁵ Works<\u002Fdiv>\n  <h2 class=\"sr d1\" style=\"font-size:clamp(1.3rem,5vw,1.8rem)\">We Don't Run Your Marketing. We Build It Into Your Practice.<\u002Fh2>\n  <p class=\"sr d2\" style=\"font-size:.88rem;margin-top:10px;color:var(--t2)\">From your side, X⁵ looks and feels like an internal marketing team — without the headcount.<\u002Fp>\n  <div class=\"props-grid sr d3\">\n    <div class=\"prop-card\">\n      <div class=\"prop-dot pd-blue\"><\u002Fdiv>\n      <div class=\"prop-label\">Your accounts, not ours<\u002Fdiv>\n      <div class=\"prop-body\">Your Google Ads, Meta, HubSpot, CallRail, Google Business Profile — under your credentials. Your billing, your pixel, your data. Nothing sits in X⁵ accounts.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"prop-card\">\n      <div class=\"prop-dot pd-green\"><\u002Fdiv>\n      <div class=\"prop-label pl-g\">Inside your Slack<\u002Fdiv>\n      <div class=\"prop-body\">No client portal, no account-manager layer. Every task, campaign, and workflow visible in your Slack and project board — in real time.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"prop-card\">\n      <div class=\"prop-dot pd-teal\"><\u002Fdiv>\n      <div class=\"prop-label pl-t\">HIPAA-safe by design<\u002Fdiv>\n      <div class=\"prop-body\">No PHI in marketing tools — only anonymous behavioral events (appointment booked, form submitted). Your team reviews and approves all content before publication. X⁵ executes; you approve.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"prop-card\">\n      <div class=\"prop-dot pd-navy\"><\u002Fdiv>\n      <div class=\"prop-label pl-n\">You own 100% — no lock-in<\u002Fdiv>\n      <div class=\"prop-body\">Open-source stack (n8n) — no black box. Built on your infrastructure. Cancel anytime — every tracking setup, reminder sequence, and automation stays with you.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n<\u002Fdiv>\n<\u002Fdiv>\n<div class=\"divline-blue\"><\u002Fdiv>\n\n<!-- ════ 5 LAYERS (white) ════ -->\n<div class=\"s-white\">\n<div class=\"wrap\">\n<section class=\"sp\">\n  <div class=\"eyebrow sr\">What We Build<\u002Fdiv>\n  <h2 class=\"sr d1\" style=\"font-size:clamp(1.3rem,5vw,1.8rem)\">One Engine. Five Layers.<br>Each One Depends on the One Below.<\u002Fh2>\n  <div class=\"layers\">\n    <div class=\"sr d1\">\n      <div class=\"layer-row\">\n        <div class=\"layer-num ln1\">1<\u002Fdiv>\n        <div class=\"layer-body\">\n          <div class=\"layer-sub\">The base — always first<\u002Fdiv>\n          <div class=\"layer-title\">Foundation &amp; Data<\u002Fdiv>\n          <div class=\"layer-desc\">Call tracking + server-side tracking maps every conversion: call, form, booking, showed. HIPAA-safe — no PHI in marketing tools. You see which campaign fills chairs.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"layer-connector\">depends on<\u002Fdiv>\n    <div class=\"sr d2\">\n      <div class=\"layer-row\">\n        <div class=\"layer-num ln2\">2<\u002Fdiv>\n        <div class=\"layer-body\">\n          <div class=\"layer-sub\">Patient acquisition<\u002Fdiv>\n          <div class=\"layer-title\">MarTech Execution<\u002Fdiv>\n          <div class=\"layer-desc\">Google Search (highest intent), Local SEO + Google Business Profile (70%+ search locally), Meta retargeting. Dedicated landing pages per service, not the homepage.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"layer-connector visible. Budget gets allocated blindly.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n<\u002Fdiv>\n<\u002Fdiv>\n<div class=\"divline-blue\"><\u002Fdiv>\n\n<!-- ════ COMPARISON (tint) ════ -->\n<div class=\"s-tint\">\n<div class=\"wrap\">\n<section class=\"sp\">\n  <div class=\"eyebrow sr\">The Engine in Numbers<\u002Fdiv>\n  <h2 class=\"sr d1\" style=\"font-size:clamp(1.3rem,5vw,1.8rem)\">This Is What Changes When the Engine Is Running.<\u002Fh2>\n  <p class=\"sr d2\" style=\"font-size:.83rem;color:var(--t2);margin-top:10px\">Five layers. Five shifts — each one measurable.<\u002Fp>\n  <div class=\"comp-table sr d3\">\n    <div class=\"comp-col-heads\">\n      <div class=\"cch-without\">Without X⁵<\u002Fdiv>\n      <div class=\"cch-with\">With X⁵<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"comp-rows\">\n      <div class=\"comp-row\">\n        <div class=\"comp-row-title\">Foundation &amp; Data<\u002Fdiv>\n        <div class=\"comp-cells\">\n          <div class=\"comp-cell without\">Form submissions tracked. Calls not tracked. No visibility into which channel or campaign drives actual bookings.<\u002Fdiv>\n          <div class=\"comp-cell with\"><strong>Every call, form, and booking attributed to the right campaign.<\u002Fstrong> Real CPA = cost per showed appointment — not just cost per click.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"comp-row\">\n        <div class=\"comp-row-title\">MarTech Execution<\u002Fdiv>\n        <div class=\"comp-cells\">\n          <div class=\"comp-cell without\">Google Ads running to the homepage. No dedicated service pages. Local Pack ranking not optimized. Review score declining.<\u002Fdiv>\n          <div class=\"comp-cell with\"><strong>Dedicated landing pages per service.<\u002Fstrong> Local SEO active. Google Business Profile optimized. Review automation running.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"comp-row\">\n        <div class=\"comp-row-title\">Revenue Operations<\u002Fdiv>\n        <div class=\"comp-cells\">\n          <div class=\"comp-cell without\">Form submitted. Staff calls back tomorrow morning. No-shows get a phone call attempt. Review requests happen at the front desk.<\u002Fdiv>\n          <div class=\"comp-cell with\"><strong>Staff alerted within 5 minutes.<\u002Fstrong> 5-step reminder sequence cuts no-shows 20–30%. Review request fires 24h post-visit automatically.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"comp-row\">\n        <div class=\"comp-row-title\">AI Automation<\u002Fdiv>\n        <div class=\"comp-cells\">\n          <div class=\"comp-cell without\">Patient asks about services at 8pm. Clinic is closed. No auto-response. Patient books at a competitor the next morning.<\u002Fdiv>\n          <div class=\"comp-cell with\"><strong>AI chatbot answers service and pricing questions 24/7.<\u002Fstrong> Auto-SMS fires within 2 minutes of after-hours form submission.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"comp-row\">\n        <div class=\"comp-row-title\">Marketing Intelligence<\u002Fdiv>\n        <div class=\"comp-cells\">\n          <div class=\"comp-cell without\">\"Google is bringing us patients.\" Based on clicks. No call tracking. No show rate by channel. Budget allocated on gut feel.<\u002Fdiv>\n          <div class=\"comp-cell with\"><strong>CPA per showed appointment by channel.<\u002Fstrong> Show rate by traffic source. Review score trend. Decisions backed by the metric that fills chairs.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <p class=\"comp-footnote sr d4\">▸ Every row above is a patient lost or a chair sitting empty. The revenue is already in the funnel.<\u002Fp>\n<\u002Fsection>\n<\u002Fdiv>\n<\u002Fdiv>\n<div class=\"divline-blue\"><\u002Fdiv>\n\n<!-- ════ TRIGGERS (white) ════ -->\n<div class=\"s-white\">\n<div class=\"wrap\">\n<section class=\"sp\">\n  <div class=\"eyebrow sr\">The Healthcare Blueprint in Action<\u002Fdiv>\n  <h2 class=\"sr d1\" style=\"font-size:clamp(1.3rem,5vw,1.8rem)\">The Practice Fills While You Sleep.<\u002Fh2>\n  <p class=\"sr d2\" style=\"font-size:.83rem;color:var(--t2);margin-top:10px\">Real triggers from the Healthcare configuration — each fires automatically, around the clock:<\u002Fp>\n  <div class=\"triggers sr d3\">\n    <div class=\"trig\">\n      <div class=\"trig-dot td-blue\"><\u002Fdiv>\n      <div>\n        <div class=\"trig-when\">Form submitted<\u002Fdiv>\n        <div class=\"trig-text\">Staff alerted instantly with full context — service of interest, source, time. <strong>The 5-minute callback window is 80% more likely to convert than a 30-minute one.<\u002Fstrong><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"trig\">\n      <div class=\"trig-dot td-amber\"><\u002Fdiv>\n      <div>\n        <div class=\"trig-when\">After-hours form (8pm)<\u002Fdiv>\n        <div class=\"trig-text\">Auto-SMS fires within 2 minutes: \"Thank you — we'll call you first thing tomorrow.\" <strong>Patient feels seen. Competitor inquiry avoided.<\u002Fstrong><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"trig\">\n      <div class=\"trig-dot td-green\"><\u002Fdiv>\n      <div>\n        <div class=\"trig-when\">Appointment booked<\u002Fdiv>\n        <div class=\"trig-text\">5-step reminder sequence activates: 72h email → 48h email → 24h SMS → 2h SMS → recovery. <strong>No-show rate drops 20–30% with this sequence alone.<\u002Fstrong><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"trig\">\n      <div class=\"trig-dot td-red\"><\u002Fdiv>\n      <div>\n        <div class=\"trig-when\">No-show<\u002Fdiv>\n        <div class=\"trig-text\">Reschedule offer fires within 1 hour. <strong>20–30% of no-shows rebook<\u002Fstrong> with a prompt, frictionless follow-up. Without it, most are lost.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"trig\">\n      <div class=\"trig-dot td-teal\"><\u002Fdiv>\n      <div>\n        <div class=\"trig-when\">Appointment completed (24h)<\u002Fdiv>\n        <div class=\"trig-text\">Review request fires automatically — Google and Healthgrades. <strong>Satisfied patients don't review without being asked.<\u002Fstrong> This sequence changes that.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"trig\">\n      <div class=\"trig-dot td-purple\"><\u002Fdiv>\n      <div>\n        <div class=\"trig-when\">Service question (9pm)<\u002Fdiv>\n        <div class=\"trig-text\">AI chatbot answers service, pricing, and availability questions 24/7. No medical history questions — <strong>all content pre-approved.<\u002Fstrong> Books directly in chat.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"predictive-box sr d4\">\n    <span class=\"predictive-label\">Predictive bundle adds:<\u002Fspan>\n    <span class=\"predictive-text\">Patient return likelihood (6-month) · LTV by acquisition channel · high-LTV patient segment identification · optimal reactivation timing per patient type.<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n<\u002Fdiv>\n<\u002Fdiv>\n<div class=\"divline-blue\"><\u002Fdiv>\n\n<!-- ════ TIMELINE (tint) ════ -->\n<div class=\"s-tint\">\n<div class=\"wrap\">\n<section class=\"sp\">\n  <div class=\"eyebrow sr\">How It Happens<\u002Fdiv>\n  <h2 class=\"sr d1\" style=\"font-size:clamp(1.3rem,5vw,1.8rem)\">Built in 90 Days. Then It Runs Daily.<\u002Fh2>\n  <div class=\"tl sr d2\">\n    <div class=\"tl-item\">\n      <div class=\"tl-dot\"><div class=\"tl-dot-fill\"><\u002Fdiv><\u002Fdiv>\n      <div>\n        <div class=\"tl-when\">Week 1<\u002Fdiv>\n        <div class=\"tl-head\">Call tracking live. Real CPA visible for the first time.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tl-item\">\n      <div class=\"tl-dot\"><div class=\"tl-dot-fill\"><\u002Fdiv><\u002Fdiv>\n      <div>\n        <div class=\"tl-when\">Weeks 2–4<\u002Fdiv>\n ass=\"s-white\">\n<div class=\"wrap\">\n<section class=\"sp\">\n  <div class=\"eyebrow sr\">Proof<\u002Fdiv>\n  <h2 class=\"sr d1\" style=\"font-size:clamp(1.3rem,5vw,1.8rem)\">Don't Take Our Word for It. Take the Data.<\u002Fh2>\n  <p class=\"sr d2\" style=\"font-size:.83rem;color:var(--t3);margin-top:10px\">Healthcare practice — high no-show rate, slow callback, calls not tracked, review management manual. X⁵ built call tracking, speed-to-contact alert, full reminder sequence, and review automation.<\u002Fp>\n  <div class=\"proof-wrap sr d3\">\n    <div class=\"chart-area\">\n      <div class=\"chart-label\">No-Show Rate — Before vs. After<\u002Fdiv>\n      <div class=\"bars\">\n        <div class=\"bar-col\">\n          <div class=\"bar-val\">34%<\u002Fdiv>\n          <div class=\"bar\" style=\"background:#E5E7EB;height:58px\"><\u002Fdiv>\n          <div class=\"bar-lbl\">Before<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"bar-col\">\n          <div class=\"bar-val after\">22%<\u002Fdiv>\n          <div class=\"bar\" style=\"background:var(--blue);height:38px;box-shadow:0 -4px 16px rgba(29,155,240,.25)\"><\u002Fdiv>\n          <div class=\"bar-lbl\">After<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"proof-stats\">\n      <div class=\"ps-card ps-r\">\n        <div class=\"ps-num psn-r\" data-counter=\"-35%\">−35%<\u002Fdiv>\n        <div class=\"ps-lbl\">No-show rate<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ps-card ps-b\">\n        <div class=\"ps-num psn-b\">&lt;5 min<\u002Fdiv>\n        <div class=\"ps-lbl\">Speed-to-contact<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ps-card ps-g\">\n        <div class=\"ps-num psn-g\">20–30%<\u002Fdiv>\n        <div class=\"ps-lbl\">No-shows rebooked<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ps-card ps-a\">\n        <div class=\"ps-num psn-a\" data-counter=\"100%\">100%<\u002Fdiv>\n        <div class=\"ps-lbl\">Reporting automated<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"proof-note\">Benchmark results from X⁵ Healthcare engine deployments.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n<\u002Fdiv>\n<\u002Fdiv>\n<div class=\"divline-blue\"><\u002Fdiv>\n\n<!-- ════ WHERE X5 FITS (tint) ════ -->\n<div class=\"s-tint\">\n<div class=\"wrap\">\n<section class=\"sp\">\n  <div class=\"eyebrow sr\">Where X⁵ Fits<\u002Fdiv>\n  <h2 class=\"sr d1\" style=\"font-size:clamp(1.3rem,5vw,1.8rem)\">X⁵ Adapts to Where Your Practice Is Right Now.<\u002Fh2>\n  <p class=\"sr d2\" style=\"font-size:.83rem;color:var(--t2);margin-top:10px\">Three situations. One engine — configured differently for each. Identify where you are, and X⁵ fills exactly what's missing.<\u002Fp>\n  <div class=\"fit-cards sr d3\">\n    <div class=\"fit-card\">\n      <div class=\"fit-tag ft1\">Leads coming in, few showing up<\u002Fdiv>\n      <div class=\"fit-card-content\">\n        <div class=\"fit-h\">Fix the gap between booking and showing.<\u002Fdiv>\n        <div class=\"fit-p\">Speed-to-contact alert built within 2 weeks. 5-step reminder sequence live in month 1. No-show recovery automated. Most practices cut their no-show rate by 20–30% within 60 days of the sequence going live.<\u002Fdiv>\n        <span class=\"fit-outcome\">→ Fewer empty chairs. Same ad spend.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"fit-card\">\n      <div class=\"fit-tag ft2\">Good show rate, patients not returning<\u002Fdiv>\n      <div class=\"fit-card-content\">\n        <div class=\"fit-h\">Turn one-visit patients into loyal ones.<\u002Fdiv>\n        <div class=\"fit-p\">90-day rebooking sequence, post-visit review automation, treatment plan follow-up, and referral ask at the right moment. Patient retention is the highest-ROI lever in healthcare — and most practices have no system for it.<\u002Fdiv>\n        <span class=\"fit-outcome go-teal\">→ Higher patient LTV. More referrals.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"fit-card\">\n      <div class=\"fit-tag ft3\">Spending on ads, can't measure what works<\u002Fdiv>\n      <div class=\"fit-card-content\">\n        <div class=\"fit-h\">Know which channel fills the schedule.<\u002Fdiv>\n        <div class=\"fit-p\">Most practices don't track calls — which means most patient acquisitions are invisible. We build call tracking, HIPAA-safe attribution, and a dashboard that shows CPA per showed appointment by channel.<\u002Fdiv>\n        <span class=\"fit-outcome go-amber\">→ Real CPA visible. Budget optimized.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"fit-note sr d4\">Not sure which situation fits? The Marketing Engine Audit maps your patient acquisition funnel — in 30 minutes.<\u002Fdiv>\n<\u002Fsection>\n<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ════ CTA (dark) ════ -->\n<div class=\"s-dark\">\n<div class=\"wrap\">\n<section class=\"cta-section sr\">\n  <div class=\"cta-wm\">X5<\u002Fdiv>\n  <div class=\"cta-pill\">\n    <div class=\"cta-dot\"><\u002Fdiv>\n    <div class=\"cta-pill-lbl\">Free — 30 Minutes<\u002Fdiv>\n  <\u002Fdiv>\n  <h2 class=\"cta-h\">See Exactly What Your Marketing Is Missing.<\u002Fh2>\n  <p class=\"cta-sub\">The Marketing Engine Audit maps your patient acquisition funnel — where leads drop, what your no-show rate is costing you, and what to fix first. You leave with the complete picture, whether we work together or not. No commitment.<\u002Fp>\n  <div class=\"reply-box\">\n    <div class=\"reply-lbl\">How to get started<\u002Fdiv>\n    <div class=\"reply-msg\">Just reply to this message with <strong>\"Audit\"<\u002Fstrong> and I'll send you a time to connect — 30 minutes, zero commitment, full picture either way.<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"cta-contact\">\n    Or reach us at <a href=\"mailto:hello@x5digital.io\">hello@x5digital.io<\u002Fa> · <a href=\"https://x5digital.io\">x5digital.io<\u002Fa>\n  <\u002Fdiv>\n  <div class=\"cta-tagline\">We don't run your marketing. We build it into your practice. · HIPAA-Safe · AI-Powered · Owned by You<\u002Fdiv>\n<\u002Fsection>\n<\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n// ── Scroll Reveal ──\nconst io = new IntersectionObserver(e => {\n  e.forEach(el => {\n    if (el.isIntersecting) {\n      el.target.classList.add('in');\n      if (el.target.classList.contains('eyebrow')) el.target.classList.add('ey-in');\n      io.unobserve(el.target);\n    }\n  });\n}, { threshold: .07, rootMargin: '0px 0px -30px 0px' });\ndocument.querySelectorAll('.sr').forEach(el => io.observe(el));\n\n// ── Eyebrow line animation ──\nconst eyeIo = new IntersectionObserver(e => {\n  e.forEach(el => { if (el.isIntersecting) { el.target.classList.add('ey-in'); eyeIo.unobserve(el.target); } });\n}, { threshold: .5 });\ndocument.querySelectorAll('.eyebrow').forEach(el => eyeIo.observe(el));\n\n// ── Counter animation ──\nfunction animateCount(el, target, duration) {\n  const isNeg = target.startsWith('−') || target.startsWith('-');\n  const hasPlus = target.startsWith('+');\n  const hasPct = target.includes('%');\n  const num = parseFloat(target.replace(/[^0-9.]/g, ''));\n  const start = performance.now();\n  (function step(now) {\n    const t = Math.min((now - start) / duration, 1);\n    const ease = 1 - Math.pow(1 - t, 3);\n    const current = Math.round(ease * num);\n    el.textContent = (isNeg ? '−' : hasPlus ? '+' : '') + current + (hasPct ? '%' : '');\n    if (t < 1) requestAnimationFrame(step);\n    else el.textContent = target;\n  })(start);\n}\nconst psIo = new IntersectionObserver(entries => {\n  entries.forEach(entry => {\n    if (entry.isIntersecting) {\n      entry.target.querySelectorAll('[data-counter]').forEach((num, i) => {\n        num.classList.add('stat-pop');\n        setTimeout(() => animateCount(num, num.dataset.counter, 900), i * 130);\n      });\n      psIo.unobserve(entry.target);\n    }\n  });\n}, { threshold: .3 });\ndocument.querySelectorAll('.proof-stats').forEach(el => psIo.observe(el));\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
